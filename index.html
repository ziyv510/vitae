<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>崔紫玉 · 软件测试简历</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

      :root {
        --bg-page: #f0ebe5;
        --card-bg: rgba(255, 252, 248, 0.92);
        --card-border: rgba(200, 180, 165, 0.20);
        --accent: #c47a54;
        --accent-light: #e8d0c0;
        --text-primary: #2a1f18;
        --text-secondary: #4d3d32;
        --text-muted: #8a7a6e;
        --shadow: rgba(80, 60, 40, 0.10);
      }
      
      body { 
        background: #f0ebe5;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
      }
      
      #bg-canvas { 
        position: fixed; 
        inset: 0; 
        z-index: 0; 
        width: 100vw;
        height: 100vh;
        opacity: 0.35;
        pointer-events: none;
      }
      
      #app { 
        position: relative; 
        z-index: 10; 
      }

      .glass-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: 0 8px 40px -12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
        border-radius: 16px;
        overflow: hidden;
      }

      .accent-bar {
        background: var(--accent);
        height: 3px;
        width: 48px;
        border-radius: 4px;
        margin-bottom: 10px;
      }

      .avatar-ring {
        border: 2px solid rgba(196, 122, 84, 0.20);
        box-shadow: 0 0 30px rgba(196, 122, 84, 0.04);
      }

      .skill-tag {
        background: rgba(196, 122, 84, 0.07);
        border: 1px solid rgba(196, 122, 84, 0.10);
        color: var(--text-secondary);
        font-size: 0.7rem;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        transition: all 0.2s ease;
      }
      .skill-tag:hover {
        background: rgba(196, 122, 84, 0.13);
        border-color: rgba(196, 122, 84, 0.20);
      }

      .project-card {
        background: rgba(248, 242, 236, 0.6);
        border: 1px solid rgba(200, 180, 165, 0.12);
        border-radius: 12px;
        padding: 1rem;
        transition: all 0.3s ease;
      }
      .project-card:hover {
        border-color: rgba(196, 122, 84, 0.20);
        box-shadow: 0 8px 24px -12px rgba(80, 60, 40, 0.12);
        background: rgba(248, 242, 236, 0.85);
      }

      .project-tag {
        background: rgba(196, 122, 84, 0.06);
        border: 1px solid rgba(196, 122, 84, 0.08);
        color: var(--text-secondary);
        font-size: 0.65rem;
        padding: 0.1rem 0.6rem;
        border-radius: 9999px;
      }

      .exp-divider {
        border-color: rgba(200, 180, 165, 0.10);
      }

      .btn-primary {
        background: rgba(196, 122, 84, 0.08);
        border: 1px solid rgba(196, 122, 84, 0.15);
        color: var(--accent);
        padding: 0.35rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
      }
      .btn-primary:hover {
        background: rgba(196, 122, 84, 0.15);
        border-color: rgba(196, 122, 84, 0.30);
      }
      .btn-secondary {
        background: rgba(160, 140, 125, 0.06);
        border: 1px solid rgba(160, 140, 125, 0.12);
        color: var(--text-secondary);
        padding: 0.35rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
      }
      .btn-secondary:hover {
        background: rgba(160, 140, 125, 0.10);
        border-color: rgba(160, 140, 125, 0.20);
      }
      .btn-danger {
        background: rgba(200, 100, 80, 0.06);
        border: 1px solid rgba(200, 100, 80, 0.12);
        color: #b06a5a;
        padding: 0.35rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
      }
      .btn-danger:hover {
        background: rgba(200, 100, 80, 0.12);
        border-color: rgba(200, 100, 80, 0.20);
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: rgba(200, 180, 165, 0.08); }
      ::-webkit-scrollbar-thumb { background: rgba(196, 122, 84, 0.20); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(196, 122, 84, 0.35); }

      .contact-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        font-size: 0.9rem;
        transition: color 0.2s ease;
      }
      .contact-item:hover { color: var(--accent); }

      .skill-list-item {
        color: var(--text-secondary);
        font-size: 0.85rem;
        line-height: 1.7;
        padding: 0.05rem 0;
      }

      .modal-content {
        background: #fcf8f4;
        border: 1px solid rgba(200, 180, 165, 0.15);
        border-radius: 16px;
      }
      .modal-input {
        background: rgba(255, 252, 248, 0.5);
        border: 1px solid rgba(200, 180, 165, 0.15);
        color: var(--text-primary);
        padding: 0.6rem 0.8rem;
        border-radius: 10px;
        font-size: 0.9rem;
        width: 100%;
        outline: none;
        transition: all 0.2s ease;
      }
      .modal-input:focus {
        border-color: rgba(196, 122, 84, 0.30);
        box-shadow: 0 0 0 3px rgba(196, 122, 84, 0.04);
      }
      .modal-label {
        color: var(--text-secondary);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        display: block;
        margin-bottom: 0.2rem;
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div id="app" class="container mx-auto p-4 md:p-6 max-w-6xl">
      <div class="glass-card">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
          
          <!-- ====== 左侧 ====== -->
          <div class="lg:col-span-4 p-6 md:p-8">
            
            <div class="flex items-center lg:block">
              <div class="avatar-ring w-20 h-20 lg:w-28 lg:h-28 rounded-full flex items-center justify-center flex-shrink-0">
                <div class="w-16 h-16 lg:w-24 lg:h-24 rounded-full bg-gradient-to-br from-[#e8d0c0]/40 to-[#c47a54]/20 flex items-center justify-center text-3xl lg:text-4xl font-light text-[#c47a54]/40">
                  C
                </div>
              </div>
              <div class="ml-4 lg:ml-0 lg:mt-4">
                <h1 id="name" class="text-2xl lg:text-3xl font-semibold text-[#2a1f18] tracking-tight">崔紫玉</h1>
                <p id="title" class="text-sm text-[#6b5a4c] mt-0.5">计算机科学与技术 · 软件测试</p>
              </div>
            </div>

            <div class="accent-bar mt-6"></div>

            <div class="mt-4 space-y-1.5">
              <div class="contact-item">
                <span class="text-[#c47a54]/50 text-sm">📱</span>
                <span id="contact" class="text-[#4d3d32]">17526398684</span>
              </div>
              <div class="contact-item">
                <span class="text-[#c47a54]/50 text-sm">✉️</span>
                <span class="text-[#4d3d32]">3398075968@qq.com</span>
              </div>
              <div class="contact-item">
                <span class="text-[#c47a54]/50 text-sm">📍</span>
                <span class="text-[#4d3d32]">陕西省西安市</span>
              </div>
            </div>

            <div class="mt-6">
              <h2 class="text-xs font-semibold text-[#c47a54] uppercase tracking-wider mb-3">专业技能</h2>
              <ul id="skills" class="space-y-0.5"></ul>
            </div>

            <div class="mt-6">
              <h2 class="text-xs font-semibold text-[#c47a54] uppercase tracking-wider mb-3">技术栈</h2>
              <div id="techStack" class="flex flex-wrap gap-1.5"></div>
            </div>

            <div class="mt-8 flex flex-wrap gap-2 pt-4 border-t border-[rgba(200,180,165,0.15)]">
              <button id="editBtn" class="btn-primary">✎ 编辑</button>
              <button id="resetBtn" class="btn-danger">↻ 重置</button>
            </div>
          </div>

          <!-- ====== 右侧 ====== -->
          <div class="lg:col-span-8 p-6 md:p-8 bg-[rgba(248,242,236,0.15)] border-l border-[rgba(200,180,165,0.06)]">
            
            <div>
              <h2 class="text-xs font-semibold text-[#c47a54] uppercase tracking-wider mb-2">关于我</h2>
              <p id="summary" class="text-sm text-[#3d2e24] leading-relaxed">加载中…</p>
            </div>

            <div class="mt-8">
              <h2 class="text-xs font-semibold text-[#c47a54] uppercase tracking-wider mb-3">项目经历</h2>
              <div id="projects" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div class="mt-8">
              <h2 class="text-xs font-semibold text-[#c47a54] uppercase tracking-wider mb-3">荣誉与职务</h2>
              <div id="experience" class="space-y-3"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center text-[#b8a898] text-xs mt-6 opacity-60">
        ✦ 数据保存在浏览器 localStorage ✦
      </div>
    </div>

    <!-- ====== 模态框 ====== -->
    <div id="editor" class="fixed inset-0 hidden items-center justify-center bg-[#2a1f18]/30 backdrop-blur-sm z-20 p-4">
      <div class="modal-content w-full max-w-2xl shadow-2xl p-6 max-h-[90vh] overflow-y-auto">
        <h3 class="text-lg font-medium text-[#2a1f18]">✎ 编辑简历</h3>
        <p class="text-xs text-[#8a7a6e] mt-0.5">数据自动保存到浏览器 localStorage</p>
        
        <div class="mt-5 grid grid-cols-1 gap-3.5">
          <div>
            <label class="modal-label">姓名</label>
            <input id="inputName" class="modal-input" />
          </div>
          <div>
            <label class="modal-label">标题</label>
            <input id="inputTitle" class="modal-input" />
          </div>
          <div>
            <label class="modal-label">联系方式</label>
            <input id="inputContact" class="modal-input" />
          </div>
          <div>
            <label class="modal-label">个人简介</label>
            <textarea id="inputSummary" class="modal-input" rows="3"></textarea>
          </div>
          <div>
            <label class="modal-label">专业技能（逗号分隔）</label>
            <input id="inputSkills" class="modal-input" />
          </div>
          <div>
            <label class="modal-label">技术栈（逗号分隔）</label>
            <input id="inputTechStack" class="modal-input" />
          </div>
          <div>
            <label class="modal-label">项目（每行：标题|描述|标签逗号分隔）</label>
            <textarea id="inputProjects" class="modal-input" rows="4"></textarea>
          </div>
          <div>
            <label class="modal-label">荣誉与职务（每行：标题|时间|详述）</label>
            <textarea id="inputExperience" class="modal-input" rows="4"></textarea>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap justify-end gap-2">
          <button id="cancelEdit" class="btn-secondary">取消</button>
          <button id="saveEdit" class="btn-primary">💾 保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/three-bg.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
